services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: ssm-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ssm}
      POSTGRES_USER: ${POSTGRES_USER:-ssm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ssm_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ssm_user} -d ${POSTGRES_DB:-ssm}"]
      interval: 10s
      timeout: 5s
      retries: 5

